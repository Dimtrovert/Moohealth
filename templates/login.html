<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MooHealth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('/static/images/SAPILOGIN.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(8px); /* Apply blur effect only to the background image */
            z-index: -1;
        }

        .login-container {
            margin: 0 auto; /* Center the login container horizontally */
            background: white; /* Restore white background */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .login-container img {
            width: 100px;
            margin-bottom: 10px; /* Reduce the space between the logo and the login title */
        }

        .login-container form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-container input, .login-container button {
            width: 100%;
            max-width: 300px; /* Ensure consistent width for inputs and button */
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        .login-container button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }

        .login-container button:hover {
            background: #2980b9;
        }

        .login-container p {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .login-container p a {
            color: #3498db;
            text-decoration: none;
        }

        .login-container p a:hover {
            text-decoration: underline;
        }

        .error-popup {
            position: fixed;
            bottom: 20px;
            right: -300px; /* Start off-screen */
            background-color: white;
            color: red;
            padding: 15px;
            border: 1px solid red;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            font-size: 14px;
            animation: slideIn 0.5s forwards;
        }

        @keyframes slideIn {
            from {
                right: -300px;
            }
            to {
                right: 20px;
            }
        }
    </style>
</head>
<body>
    {% if error %}
    <div class="error-popup">
        {{ error }}
    </div>
    {% endif %}

    <div class="login-container">
        <img src="/static/images/UNPAD.JPG" alt="MooHealth Logo">
        <h1>Login</h1>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>© 2026 PKM : Moohealth Universitas Padjajaran</p>
    </div>
</body>
</html>
